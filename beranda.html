<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMath - Beranda</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kdam+Thmor+Pro&display=swap" rel="stylesheet">
    <style>
        /* Reset basic margin dan padding */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background-color: #1a1a1a; /* Latar belakang luar canvas */
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Kdam Thmor Pro', sans-serif;
}

/* Container utama berukuran tetap 1440x1024 */
.canvas-container {
    width: 1440px;
    height: 1024px;
    background-color: #1c1c1c;
    display: flex;
    flex-direction: column;
    position: relative;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

/* Label teks "Beranda" paling atas sendiri */
.top-label {
    height: 50px;
    color: #666666;
    font-size: 16px;
    display: flex;
    align-items: center;
    padding-left: 30px;
}

/* Kotak bagian dalam yang memberi jarak border hitam di kanan, kiri, bawah */
.inner-box {
    flex: 1;
    margin: 0 30px 30px 30px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

/* Navigation Bar Biru Tua */
.navbar {
    height: 80px;
    background-color: #0042aa; /* Warna biru gelap navbar */
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 40px;
    color: #ffffff;
}

.logo {
    font-size: 32px;
    letter-spacing: 0.5px;
}

.menu-items {
    display: flex;
    gap: 25px;
}

.menu-link {
    color: #ffffff;
    text-decoration: none;
    font-size: 24px;
    padding-bottom: 2px;
    transition: opacity 0.2s;
}

/* Efek garis bawah putih tebal pada menu aktif ("Beranda") */
.menu-link.active {
    border-bottom: 4px solid #ffffff;
}

.menu-link:hover {
    opacity: 0.8;
}

.search-icon {
    display: flex;
    align-items: center;
    cursor: pointer;
}

/* Area Konten Utama Biru Terang */
.main-content {
    flex: 1;
    background-color: #0056df; /* Warna biru utama sesuai gambar */
    display: flex;
    align-items: flex-start; /* Sejajar ke atas sesuai layout gambar */
    padding: 110px 100px;

    background-image: url('image/beranda.svg'); 
    background-size: cover;       /* Gambar otomatis menyesuaikan ukuran kotak */
    background-position: center;  /* Gambar selalu berada di tengah */
    background-repeat: no-repeat; /* Mencegah gambar berulang/patah-patah */
}

.content-wrapper {
    max-width: 800px;
}

/* Judul Utama */
.hero-title {
    font-size: 54px;
    color: #ffffff;
    font-weight: normal;
    line-height: 1.3;
    margin-bottom: 20px;
}

/* Deskripsi kecil di bawah judul */
.hero-desc {
    font-family: sans-serif; /* Menggunakan sans-serif standar agar rapi sesuai gambar */
    font-size: 20px;
    color: #e0e0e0;
    margin-bottom: 40px;
    line-height: 1.6;
}

.hero-desc strong {
    color: #ffffff;
}

/* Grup Tombol */
.btn-group {
    display: flex;
    gap: 20px;
}

.btn {
    display: inline-block;
    text-decoration: none;
    font-size: 18px;
    font-family: sans-serif;
    padding: 14px 28px;
    border-radius: 8px;
    transition: background-color 0.2s, transform 0.1s;
}

/* Tombol "Mulai Belajar" */
.btn-dark {
    background-color: #002e77;
    color: #ffffff;
}

.btn-dark:hover {
    background-color: #001f52;
}

/* Tombol "Cari Materi" & "Latihan Soal" */
.btn-light {
    background-color: #84cbff;
    color: #204060;
}

.btn-light:hover {
    background-color: #60b2f0;
}

.btn:active {
    transform: scale(0.98);
}
    </style>
</head>
<body>

    <div class="canvas-container">
        
        <div class="top-label">Beranda</div>
        
        <div class="inner-box">
            
            <nav class="navbar">
                <div class="logo">EMath</div>
                <div class="menu-items">
                    <a href="beranda.html" class="menu-link active">Beranda</a>
                    <a href="materi.html" class="menu-link">Materi</a>
                    <a href="latihan.html" class="menu-link">Latihan</a>
                    <a href="rumus.html" class="menu-link">Rumus</a>
                    <a href="tentang.html" class="menu-link">Tentang</a>
                    <a href="kontak.html" class="menu-link">Kontak</a>
                </div>
                <div class="search-icon">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                </div>
            </nav>
            
            <main class="main-content">
                <div class="content-wrapper">
                    <h1 class="hero-title">Belajar Matematika<br>SMA dengan Mudah</h1>
                    <p class="hero-desc">Materi kelas <strong>10</strong>, <strong>11</strong> dan <strong>12</strong> lengkap dengan contoh soal dan latihan.</p>
                    
                    <div class="btn-group">
                        <a href="materi.html" class="btn btn-dark">Mulai Belajar</a>
                        <a href="materi.html" class="btn btn-light">Cari Materi</a>
                        <a href="latihan.html" class="btn btn-light">Latihan Soal</a>
                    </div>
                </div>
            </main>

        </div>

    </div>

</body>
</html>
